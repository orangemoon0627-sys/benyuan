name: BenyuanOriginShell
configs:
  Debug: debug
  Staging: release
  Release: release
options:
  bundleIdPrefix: com.fanhao
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.fanhao.benyuan.origin.shell
    MARKETING_VERSION: 0.2.1
    CURRENT_PROJECT_VERSION: 3
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Info.plist
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  BenyuanOriginShell:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: swiftui-starter
      - path: BenyuanDesignTokens.swift
      - path: native-smoke-fixture.png
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: BenyuanOriginShell
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          BenyuanShellEnvironment: development
          BenyuanShellStagingBaseURL: http://120.26.126.88
          BenyuanShellProductionBaseURL: http://120.26.126.88
        Staging:
          BenyuanShellEnvironment: staging
          BenyuanShellStagingBaseURL: http://120.26.126.88
          BenyuanShellProductionBaseURL: http://120.26.126.88
        Release:
          BenyuanShellEnvironment: production
          BenyuanShellStagingBaseURL: http://120.26.126.88
          BenyuanShellProductionBaseURL: http://120.26.126.88
schemes:
  BenyuanOriginShell:
    build:
      targets:
        BenyuanOriginShell: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
