name: BenyuanOriginShell
configs:
  Debug: debug
  Staging: release
  Release: release
options:
  bundleIdPrefix: com.fanhao
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.fanhao.benyuan.origin.shell
    MARKETING_VERSION: 0.2.1
    CURRENT_PROJECT_VERSION: 20
    BENYUAN_WECHAT_APP_ID: ""
    BENYUAN_WECHAT_UNIVERSAL_LINK: https://app.orangemoonai.cn/app/benyuan/
    BENYUAN_WECHAT_ASSOCIATED_DOMAIN: applinks:app.orangemoonai.cn
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Info.plist
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  BenyuanOriginShell:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: swiftui-starter
      - path: BenyuanDesignTokens.swift
      - path: BenyuanOriginShell-Bridging-Header.h
      - path: native-smoke-fixture.png
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: BenyuanOriginShell
        CODE_SIGN_ENTITLEMENTS: BenyuanOriginShell.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: BenyuanOriginShell-Bridging-Header.h
      configs:
        Debug:
          BenyuanShellEnvironment: development
          BenyuanShellStagingBaseURL: http://120.26.126.88
          BenyuanShellProductionBaseURL: http://120.26.126.88
        Staging:
          BenyuanShellEnvironment: staging
          BenyuanShellStagingBaseURL: https://staging-benyuan.orangemoonai.cn
          BenyuanShellProductionBaseURL: https://benyuan.orangemoonai.cn
        Release:
          BenyuanShellEnvironment: production
          BenyuanShellStagingBaseURL: http://120.26.126.88
          BenyuanShellProductionBaseURL: https://staging-benyuan.orangemoonai.cn
  BenyuanOriginShellTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: Tests
    dependencies:
      - target: BenyuanOriginShell
    settings:
      base:
        PRODUCT_NAME: BenyuanOriginShellTests
        PRODUCT_BUNDLE_IDENTIFIER: com.fanhao.benyuan.origin.shell.tests
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ""
schemes:
  BenyuanOriginShell:
    build:
      targets:
        BenyuanOriginShell: all
        BenyuanOriginShellTests: [test]
    test:
      config: Debug
      targets:
        - BenyuanOriginShellTests
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
